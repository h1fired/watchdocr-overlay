name: WatchdOcr Release Build

on: 
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  build:

    strategy:
      matrix:
        python-version: [ 3.11.9 ]

    runs-on: 'windows-latest'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup project
        run: |
          uv sync
          uv run ./tools/resources.py --generate --compile

      - name: Disable debug mode
        shell: bash
        run: |
          sed -i 's/^DEBUG = True/DEBUG = False/' ./config/default.py
    
      - name: Build release (installer and portable)
        run: |
          uv run ./tools/compile/compiler.py --installer --portable
